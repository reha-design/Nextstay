services:
  db:
    image: mysql:8.0
    container_name: nextstay-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: nextstay
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    volumes:
      - nextstay-db-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  nextstay-db-data:
