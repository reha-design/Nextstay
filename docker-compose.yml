services:
  db:
    image: mysql:8.0
    container_name: nextstay-mysql
    ports:
      - "127.0.0.1:13306:3306"
    environment:
      MYSQL_DATABASE: nextstay
      MYSQL_USER: nextstay_admin
      MYSQL_PASSWORD: nextstay_db_pass_2026
      MYSQL_ROOT_PASSWORD: nextstay_db_pass_2026
      TZ: Asia/Seoul
    volumes:
      - nextstay-db-data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  rabbitmq:
    image: rabbitmq:3-management
    container_name: nextstay-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  nextstay-db-data:
