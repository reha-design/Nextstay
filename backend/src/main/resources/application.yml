spring:
  application:
    name: nextstay
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/nextstay?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:nextstay_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:nextstay_db_pass_2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %clr(%-5level) --- %msg%n"

server:
  port: 8080

jwt:
  # 개발용 고정 시크릿 (실제 운영 시 환경변수로 관리 필수)
  secret: nextstay_secret_key_fixed_20260307_very_long_string_for_testing
  expiration: 86400000 # 24시간

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
